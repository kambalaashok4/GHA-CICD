name: CI/CD — Build, Test, and Deploy to AWS ECS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Restrict default GITHUB_TOKEN permissions for all jobs
permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  APP_NAME: django-app
  ENVIRONMENT: dev
  TF_WORKING_DIR: terraform

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint and Test the Django application
  # ─────────────────────────────────────────────
  test:
    name: Test Django App
    #runs-on: ubuntu-latest
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run Django tests
        working-directory: app
        env:
          DJANGO_SETTINGS_MODULE: myproject.settings
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
        run: python manage.py test --verbosity=2

  # ─────────────────────────────────────────────
  # Job 2: Build Docker image and push to ECR
  # (runs only on push to main)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    runs-on:  self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY=${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}" >> "$GITHUB_ENV"

      - name: Build Docker image
        working-directory: app
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.meta.outputs.image_tag }}" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .

      - name: Push Docker image to ECR
        run: |
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.meta.outputs.image_tag }}"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

  # ─────────────────────────────────────────────
  # Job 3: Terraform plan (on PRs) or apply (on main)
  # ─────────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=django-ecs/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="app_name=${{ env.APP_NAME }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="ecr_image_tag=${{ needs.build-and-push.outputs.image_tag }}" \
            -var="django_secret_key=${{ secrets.DJANGO_SECRET_KEY }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ─────────────────────────────────────────────
  # Job 4: Terraform plan only (on PRs)
  # ─────────────────────────────────────────────
  terraform-plan-pr:
    name: Terraform Plan (PR)
    runs-on:  self-hosted
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=django-ecs/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="app_name=${{ env.APP_NAME }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="ecr_image_tag=latest" \
            -var="django_secret_key=${{ secrets.DJANGO_SECRET_KEY }}"
